name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        # Vitest 4 (rolldown) requires Node >= 20.12 (node:util styleText).
        # Node 18 still validates lint + typecheck + build above; the built
        # CLI itself supports Node 18 (engines >=18, tsup target node18).
        if: matrix.node-version != '18.x'
        run: npm test

      - name: Build
        run: npm run build
